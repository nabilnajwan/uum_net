name: uum_net
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  connectivity_plus: ^7.0.0
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_internet_signal: ^0.0.43
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_generative_ai: ^0.4.7
