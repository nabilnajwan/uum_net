  image_picker: ^1.2.1
  latlong2: ^0.9.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
     - .env

flutter_icons:
